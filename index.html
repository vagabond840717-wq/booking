  return `<div class="cal-scroll" id="monthCalScroll"><table class="cal-table"><thead>${buildDayRow(days,curY,curM)}</thead><tbody>${buildBodyRows(days,curY,curM)}</tbody></table></div>`;
}

// ── 월간 스와이프/휠로 달 전환 ──
let _swipeStartX=0, _swipeStartY=0, _swipeScrollLeft=0, _isSwiping=false;
function attachMonthSwipe(){
  const el=document.getElementById('monthCalScroll');
  if(!el) return;

  // 터치 스와이프
  el.addEventListener('touchstart',e=>{
    _swipeStartX=e.touches[0].clientX;
    _swipeStartY=e.touches[0].clientY;
    _swipeScrollLeft=el.scrollLeft;
    _isSwiping=true;
  },{passive:true});
  el.addEventListener('touchend',e=>{
    if(!_isSwiping) return;
    _isSwiping=false;
    const dx=e.changedTouches[0].clientX-_swipeStartX;
    const dy=e.changedTouches[0].clientY-_swipeStartY;
    // 수평 스와이프가 수직보다 크고, 테이블 끝에 닿았을 때만 달 전환
    if(Math.abs(dx)>Math.abs(dy)*1.5 && Math.abs(dx)>50){
      const atStart=el.scrollLeft<=2;
      const atEnd=el.scrollLeft>=el.scrollWidth-el.clientWidth-2;
      if(dx>0 && atStart){
        // 이전 달
        curM--;if(curM<0){curM=11;curY--;}
        render();
      } else if(dx<0 && atEnd){
        // 다음 달
        curM++;if(curM>11){curM=0;curY++;}
        render();
      }
    }
  },{passive:true});

  // 마우스 휠 (수평 휠 또는 수직 휠 + 끝 감지)
  el.addEventListener('wheel',e=>{
    const hScroll=Math.abs(e.deltaX)>Math.abs(e.deltaY);
    if(hScroll) return; // 가로 스크롤은 기본 동작
    // 세로 휠인데 테이블 끝에 닿으면 달 전환
    const atStart=el.scrollLeft<=2;
    const atEnd=el.scrollLeft>=el.scrollWidth-el.clientWidth-2;
    if(e.deltaY<0 && atStart){
      e.preventDefault();
      curM--;if(curM<0){curM=11;curY--;}
      render();
    } else if(e.deltaY>0 && atEnd){
      e.preventDefault();
      curM++;if(curM>11){curM=0;curY++;}
      render();
    }
  },{passive:false});
}

function renderWeek(){
  if(!rooms.length) return emptyState();
  const days=daysIn(curY,curM);
  let weeks=[],wk=[];
  for(let d=1;d<=days;d++){
    wk.push(d);
    const dow=new Date(curY,curM,d).getDay();
    if(dow===6||d===days){weeks.push([...wk]);wk=[];}
  }
  let html='';
  for(const week of weeks){
    const ws=week[0],we=week[week.length-1];
    // io row
    const t2=today();
    let ioRow='';

    ioRow+='</tr>';
    let dayRow=`<tr>${stickyTh()}`;
    week.forEach(d=>{
      const dow=new Date(curY,curM,d).getDay();
      const isT=curY===t2.y&&curM===t2.m&&d===t2.d;
      const cls=isT?'today-hd':dow===0?'sun':dow===6?'sat':'';
      dayRow+=`<th class="day-th ${cls}" data-y="${curY}" data-m="${curM}" data-d="${d}">${d}<br><span class="dname">${DAY_KO[dow]}</span></th>`;
    });
    dayRow+='</tr>';
    let bodyRows='';
    for(const r of rooms){
      const ri=rooms.indexOf(r);
      bodyRows+=`<tr class="cal-row">${stickyTd(r)}`;
      week.forEach(d=>{
        const{cls,lbl}=cellClsAndLbl(r,d,curY,curM);
        const isT=curY===t2.y&&curM===t2.m&&d===t2.d;
        bodyRows+=`<td class="day-cell${isT?' today-ring':''}" data-ri="${ri}" data-y="${curY}" data-m="${curM}" data-d="${d}"><div class="cell-inner ${cls}">${lbl}</div></td>`;
      });
      bodyRows+='</tr>';
    }
    // checkout cards
    const coMap={};
    week.forEach(d=>{
      rooms.forEach(r=>{
        const all=[...(r.bookings||[]),...(r.bkBookings||[]),...(r.trBookings||[]),...(r.lvBookings||[])];
        if(all.some(bk=>new Date(bk.coutY,bk.coutM,bk.coutD).getTime()===new Date(curY,curM,d).getTime())){
          if(!coMap[d]) coMap[d]=[];
          coMap[d].push(r.name);
        }
      });
    });
    const coCards=Object.keys(coMap).map(d=>{
      const dow=new Date(curY,curM,+d).getDay();
      return `<div class="checkout-card"><strong>${curM+1}/${d}(${DAY_KO[dow]}) 체크아웃</strong><br><span>${coMap[d].join(' · ')}</span></div>`;
    }).join('');
    html+=`<div class="week-block"><div class="week-label">${curM+1}월 ${ws}일 — ${we}일</div><div class="cal-scroll"><table class="cal-table"><thead>${dayRow}</thead><tbody>${bodyRows}</tbody></table></div>${coCards?`<div class="checkout-cards">${coCards}</div>`:''}</div>`;
  }
  return html;
}

function renderMulti(){
  if(!rooms.length) return emptyState();
  const t2=today();
  // curY, curM 기준으로 1개월 전부터 6개월 (총 7개월)
  const months=[];
  for(let i=-1;i<MONTHS_TO_SHOW;i++){
    let y=curY,m=curM+i;
    while(m>11){m-=12;y++;}
    while(m<0){m+=12;y--;}
    months.push({y,m});
  }
  let monthRow=`<tr>${stickyTh('z-index:6;')}`;
  months.forEach(({y,m})=>{
    const days=daysIn(y,m);
    monthRow+=`<th colspan="${days}" class="multi-month-label">${y}.${String(m+1).padStart(2,'0')}</th>`;
  });
  monthRow+='</tr>';
  let ioRow='';

  ioRow+='</tr>';
  let dayRow=`<tr>${stickyTh('z-index:6;')}`;
  months.forEach(({y,m})=>{
    for(let d=1;d<=daysIn(y,m);d++){
      const dow=new Date(y,m,d).getDay();
      const isT=y===t2.y&&m===t2.m&&d===t2.d;
      const cls=isT?'today-hd':dow===0?'sun':dow===6?'sat':'';
      dayRow+=`<th class="day-th ${cls}" data-y="${y}" data-m="${m}" data-d="${d}">${d}<br><span class="dname">${DAY_KO[dow]}</span></th>`;
    }
  });
  dayRow+='</tr>';
  let bodyRows='';
  for(const r of rooms){
    const ri=rooms.indexOf(r);
    bodyRows+=`<tr class="cal-row">${stickyTd(r)}`;
    months.forEach(({y,m})=>{
      for(let d=1;d<=daysIn(y,m);d++){
        const{cls,lbl}=cellClsAndLbl(r,d,y,m);
        const isT=y===t2.y&&m===t2.m&&d===t2.d;
        bodyRows+=`<td class="day-cell${isT?' today-ring':''}" data-ri="${ri}" data-y="${y}" data-m="${m}" data-d="${d}"><div class="cell-inner ${cls}">${lbl}</div></td>`;
      }
    });
    bodyRows+='</tr>';
  }
  return `<div class="cal-scroll"><table class="cal-table"><thead>${monthRow}${dayRow}</thead><tbody>${bodyRows}</tbody></table></div>`;
}

function emptyState(){
  return `<div class="empty-state"><div class="big">🏠</div><strong>호실이 없어요</strong><br>☰ 를 눌러 iCal 링크로 호실을 추가해보세요.</div>`;
}

function render(){
  const isMulti=viewMode==='multi';
  document.getElementById('monthDisplay').textContent=`${curY}. ${String(curM+1).padStart(2,'0')}`;
  document.getElementById('prevBtn').style.visibility='visible';
  document.getElementById('nextBtn').style.visibility='visible';
  if(viewMode==='month'){document.getElementById('calendarArea').innerHTML=renderMonth();attachMonthSwipe();}
  else if(viewMode==='week') document.getElementById('calendarArea').innerHTML=renderWeek();
  else document.getElementById('calendarArea').innerHTML=renderMulti();
  updateTodayBanner();
  attachCellClicks();
  scrollToToday();
}

function scrollToToday(){
  _pinnedCol={y:null,m:null,d:null}; // 오늘로 이동 시 핀 초기화
  requestAnimationFrame(()=>{
    const tc=document.querySelector('.today-ring');
    if(tc){const se=tc.closest('.cal-scroll');if(se){const cr=tc.getBoundingClientRect(),sr=se.getBoundingClientRect();se.scrollBy({left:cr.left-sr.left-sr.width*0.25,behavior:'smooth'});}}
  });
}

function goToDate(dateStr){
  const parts=dateStr.split('.');
  const y=+parts[0],m=+parts[1]-1,d=+parts[2];
  // 해당 월이 현재 뷰에 없으면 이동
  if(viewMode==='month'&&(curY!==y||curM!==m)){curY=y;curM=m;render();}
  requestAnimationFrame(()=>{
    const cell=document.querySelector(`[data-y="${y}"][data-m="${m}"][data-d="${d}"]`);
    if(cell){
      cell.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
      cell.querySelector('.cell-inner').style.outline='2px solid var(--ob-color)';
      setTimeout(()=>{if(cell.querySelector('.cell-inner'))cell.querySelector('.cell-inner').style.outline='';},2000);
    }
  });
}

// ── DETAIL ──
function attachCellClicks(){
  // 날짜 헤더(th) hover (PC)
  document.querySelectorAll('.day-th[data-y]').forEach(th=>{
    th.addEventListener('mouseenter',()=>{
      const y=+th.dataset.y,m=+th.dataset.m,d=+th.dataset.d;
      if(!isNaN(y)&&!isNaN(m)&&!isNaN(d)) hoverBanner(y,m,d);
    });
    th.addEventListener('mouseleave',()=>leaveBanner());
  });

  document.querySelectorAll('.day-cell').forEach(cell=>{
    let _lpTimer=null, _isLongPress=false;

    // PC: 마우스 호버
    cell.addEventListener('mouseenter',()=>{
      const y=+cell.dataset.y,m=+cell.dataset.m,d=+cell.dataset.d;
      if(!isNaN(y)&&!isNaN(m)&&!isNaN(d)) hoverBanner(y,m,d);
    });
    cell.addEventListener('mouseleave',()=>leaveBanner());

    // 모바일: 롱프레스 + 드래그로 열 이동
    cell.addEventListener('touchstart',e=>{
      _isLongPress=false;
      const y=+cell.dataset.y,m=+cell.dataset.m,d=+cell.dataset.d;
      _lpTimer=setTimeout(()=>{
        _isLongPress=true;
        if(!isNaN(y)&&!isNaN(m)&&!isNaN(d)){
          hoverBanner(y,m,d);
          if(navigator.vibrate) navigator.vibrate(30);
        }
      },400);
    },{passive:true});
    cell.addEventListener('touchend',()=>{
      clearTimeout(_lpTimer);
      if(_isLongPress) leaveBanner();
    },{passive:true});
    cell.addEventListener('touchmove',e=>{
      if(!_isLongPress){clearTimeout(_lpTimer);return;}
      // 롱프레스 중 드래그 → 손가락 위치 셀 감지
      const touch=e.touches[0];
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      const target=el&&(el.closest('.day-cell')||el.closest('.day-th[data-y]'));
      if(target&&target.dataset.y){
        const ty=+target.dataset.y,tm=+target.dataset.m,td=+target.dataset.d;
        if(!isNaN(ty)&&!isNaN(tm)&&!isNaN(td)) hoverBanner(ty,tm,td);
      }
    },{passive:true});

    // 클릭 (PC탭 + 모바일 짧은탭)
    cell.addEventListener('click',e=>{
      e.stopPropagation();
      if(_isLongPress){_isLongPress=false;return;} // 롱프레스는 클릭 무시
      const ri=cell.dataset.ri;
      if(ri===undefined) return;
      const y=+cell.dataset.y,m=+cell.dataset.m,d=+cell.dataset.d;
      openDetail(+ri,y,m,d);
    });
  });
}

function findAllIn(bookings,y,m,d){
  const cur=new Date(y,m,d);
  return bookings.filter(bk=>cur>=new Date(bk.cinY,bk.cinM,bk.cinD)&&cur<=new Date(bk.coutY,bk.coutM,bk.coutD));
}

async function openDetail(ri,y,m,d){
  const r=rooms[ri];
  const abBks=findAllIn(r.bookings||[],y,m,d).map(b=>({...b,platform:'airbnb'}));
  const abBlkBks=findAllIn(r.abBlocks||[],y,m,d).map(b=>({...b,platform:'ab-block'}));
  const bkBks=findAllIn(r.bkBookings||[],y,m,d).map(b=>({...b,platform:'booking'}));
  const trBks=findAllIn(r.trBookings||[],y,m,d).map(b=>({...b,platform:'trip'}));
  const lvBks=findAllIn(r.lvBookings||[],y,m,d).map(b=>({...b,platform:'lv'}));
  const allBks=[...abBks,...abBlkBks,...bkBks,...trBks,...lvBks];
  const pLabel={airbnb:'✈ Airbnb','ab-block':'🚫 Airbnb 블락 (취소잔여)',booking:'🏨 Booking.com',trip:'🌐 Trip.com',lv:'🏡 리브애니웨어'};
  const pColor={airbnb:'var(--ab-out)','ab-block':'#6b7280',booking:'var(--bk-out)',trip:'var(--tr-out)',lv:'var(--lv-out)'};
  const badge=`<span style="display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;margin-right:6px;background:var(--navy-light);color:var(--navy);border:1px solid rgba(30,58,138,0.2);">${r.name}</span>`;
  document.getElementById('detailTitle').innerHTML=badge+dateStr(y,m,d);
  let obHtml='';
  if(isOverbooking(r,d,y,m)) obHtml=`<div class="ob-warning">⚠️ 오버부킹 가능성! ${allBks.length}개 플랫폼 예약 중복</div>`;
  const manualBl=manualBlocks.find(b=>{if(b.roomName!==r.name)return false;const cur=new Date(y,m,d);return cur>=new Date(b.startY,b.startM,b.startD)&&cur<=new Date(b.endY,b.endM,b.endD);});
  let bkHtml=`<div class="d-section-title">예약 정보</div>`;
  if(!allBks.length){
    bkHtml+=`<div class="no-bk">예약 없음</div>`;
  } else {
    for(const bk of allBks){
      const nights=Math.round((new Date(bk.coutY,bk.coutM,bk.coutD)-new Date(bk.cinY,bk.cinM,bk.cinD))/86400000);
      const isOut=bk.coutY===y&&bk.coutM===m&&bk.coutD===d;
      const isIn=bk.cinY===y&&bk.cinM===m&&bk.cinD===d;
      const bg=isOut?'rgba(229,80,58,0.07)':isIn?'rgba(34,160,107,0.07)':'transparent';
      const border=isOut?'rgba(229,80,58,0.3)':isIn?'rgba(34,160,107,0.3)':'var(--border2)';
      bkHtml+=`<div class="bk-info-box" style="background:${bg};border-color:${border};">
        <div class="bk-info-row"><span class="bk-info-label">플랫폼</span><span class="bk-info-value" style="color:${pColor[bk.platform]};font-weight:600;">${pLabel[bk.platform]}</span></div>
        <div class="bk-info-row"><span class="bk-info-label">체크인</span><span class="bk-info-value">${dateStr(bk.cinY,bk.cinM,bk.cinD)}</span></div>
        <div class="bk-info-row"><span class="bk-info-label">체크아웃</span><span class="bk-info-value">${dateStr(bk.coutY,bk.coutM,bk.coutD)}</span></div>
        <div class="bk-info-row"><span class="bk-info-label">박수</span><span class="bk-info-value highlight">${nights}박</span></div>
        ${isOut?'<div style="font-size:11px;color:var(--ab-out);font-weight:600;">← 오늘 체크아웃</div>':''}
        ${isIn?'<div style="font-size:11px;color:var(--ab-in);font-weight:600;">← 오늘 체크인</div>':''}
      </div>`;
    }
  }
  // ── 셀 클릭 블락 추가/수정/해제 ──
  const dstr=n=>String(n).padStart(2,'0');
  let blockHtml='';
  if(manualBl){
    blockHtml=`<div class="d-section-title" style="margin-top:4px;">🔒 수동 블락</div>
    <div class="bk-info-box" style="border-color:rgba(55,65,81,0.3);">
      <div class="block-form-row" style="margin-bottom:6px;">
        <input type="date" class="block-input" id="cellBlockStart" value="${manualBl.startY}-${dstr(manualBl.startM+1)}-${dstr(manualBl.startD)}">
        <input type="date" class="block-input" id="cellBlockEnd" value="${manualBl.endY}-${dstr(manualBl.endM+1)}-${dstr(manualBl.endD)}">
      </div>
      <input class="block-reason-input" id="cellBlockReason" placeholder="사유 (얼리체크인/레이트체크아웃 등)" value="${manualBl.reason||''}" style="margin-bottom:6px;">
      <div style="display:flex;gap:6px;">
        <button class="block-add-btn" id="cellBlockSaveBtn" style="flex:1;">저장</button>
        <button class="block-add-btn" id="cellBlockDelBtn" style="flex:1;background:var(--surface2);color:#e5503a;">블락 해제</button>
      </div>
    </div>`;
  } else if(!allBks.length){
    blockHtml=`<div class="d-section-title" style="margin-top:4px;">🔒 수동 블락</div>
    <div class="bk-info-box" style="border-color:rgba(55,65,81,0.3);">
      <div class="block-form-row" style="margin-bottom:6px;">
        <input type="date" class="block-input" id="cellBlockStart" value="${y}-${dstr(m+1)}-${dstr(d)}">
        <input type="date" class="block-input" id="cellBlockEnd" value="${y}-${dstr(m+1)}-${dstr(d)}">
      </div>
      <input class="block-reason-input" id="cellBlockReason" placeholder="사유 (얼리체크인/레이트체크아웃 등)" style="margin-bottom:6px;">
      <button class="block-add-btn" id="cellBlockSaveBtn" style="width:100%;">🔒 이 날짜 블락하기</button>
    </div>`;
  }
  // ── Trip.com 분할 UI ──
  let splitHtml='';
  splitEditState=null;
  let pendSplit=null;   // 잠정 승계 분할 (확인 카드 대상)
  let attnEntry=null;   // 주의(⚠) 통짜 기록
  const trRaw=r['_raw_trBookings']||r.trBookings||[];
  const curDate=new Date(y,m,d);
  const trSeg=trBks.find(b=>b._split);
  const trOrig=findAllIn(trRaw,y,m,d).find(b=>!b._split);
  const attnCardTitle=`<div class="d-section-title" style="margin-top:4px;">⚠ 예약이 바뀌어 확인이 필요해요</div>`;
  if(trSeg){
    const ps=trSplits.find(s=>s.roomName===r.name&&curDate>=new Date(s.origCin.y,s.origCin.m,s.origCin.d)&&curDate<new Date(s.origCout.y,s.origCout.m,s.origCout.d));
    if(ps){
      splitEditState={ri,y,m,d,roomName:r.name,oC:{...ps.origCin},oO:{...ps.origCout},boundaries:ps.boundaries.map(b=>({...b})),isSplit:true};
      if(ps.inherited&&!ps.decided){
        pendSplit=ps;
        const ext=(ps.autoEdges||[]).length===1
          ?`<button id="splitExtendBtn" style="width:100%;margin-top:6px;padding:9px;border-radius:8px;border:1px solid var(--border2);background:#fff;font-size:13px;cursor:pointer;">아니에요, 마지막 손님이 연장한 거예요 (${dateStr(ps.autoEdges[0].y,ps.autoEdges[0].m,ps.autoEdges[0].d)} 경계 제거)</button>`:'';
        splitHtml=attnCardTitle+`
        <div class="bk-info-box" style="border-color:rgba(240,179,91,0.55);background:rgba(240,179,91,0.08);">
          <div style="font-size:12px;line-height:1.5;margin-bottom:8px;">피드가 합쳐져 와서 <b>이전에 알던 경계로 잠정 분할</b>해 뒀어요. 맞는지 확인해 주세요.</div>
          <button id="splitConfirmBtn" style="width:100%;padding:9px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:13px;font-weight:600;cursor:pointer;">✔ 이 경계대로 확정 (새 예약이 맞아요)</button>
          ${ext}
          <div style="font-size:11px;color:var(--text3);margin-top:6px;">날짜가 다르면 아래 편집기에서 고쳐 저장하고, 예약 1건이 맞으면 [분할 해제]를 누르세요.</div>
        </div><div id="splitEditor"></div>`;
      } else {
        splitHtml=`<div id="splitEditor"></div>`;
      }
    }
  } else if(trOrig){
    const oC={y:trOrig.cinY,m:trOrig.cinM,d:trOrig.cinD},oO={y:trOrig.coutY,m:trOrig.coutM,d:trOrig.coutD};
    attnEntry=feedAttention.find(a=>a.roomName===r.name&&dnum(a.cin)===dnum(oC)&&dnum(a.cout)===dnum(oO))||null;
    if(attnEntry){
      splitHtml=attnCardTitle+`
      <div class="bk-info-box" style="border-color:rgba(240,179,91,0.55);background:rgba(240,179,91,0.08);">
        <div style="font-size:12px;line-height:1.5;margin-bottom:8px;">이전 예약과 날짜가 어중간하게 달라져서 자동으로 나누지 못했어요. 여러 건이면 아래 편집기로 나눠 주세요.</div>
        <button id="attnKeepBtn" style="width:100%;padding:9px;border-radius:8px;border:1px solid var(--border2);background:#fff;font-size:13px;cursor:pointer;">예약 1건이 맞아요 — 그대로 두기</button>
      </div>`;
    }
    const nights=Math.round((new Date(oO.y,oO.m,oO.d)-new Date(oC.y,oC.m,oC.d))/86400000);
    if(nights>=2){
      const rec=recommendSplit(r.name,oC,oO);
      let initB=[];
      if(rec.mode==='recommend') initB=rec.boundaries;
      else if(rec.mode==='conflict') initB=rec.boundaryCandidates||[];
      splitEditState={ri,y,m,d,roomName:r.name,oC,oO,boundaries:initB.map(b=>({...b})),isSplit:false};
      splitHtml+=`<div id="splitEditor"></div>`;
    }
  }
  const firstBk=allBks[0];
  const pwKey=firstBk
    ?`${r.name}|${firstBk.cinY}${String(firstBk.cinM+1).padStart(2,'0')}${String(firstBk.cinD).padStart(2,'0')}`
    :manualBl
      ?`${r.name}|${manualBl.startY}${String(manualBl.startM+1).padStart(2,'0')}${String(manualBl.startD).padStart(2,'0')}`
      :`${r.name}|${dateStr(y,m,d)}`;
  const extra=await loadExtra(pwKey);
  const curPw=extra.passwords&&extra.passwords.length?extra.passwords[0]:null;
  let pwHtml=`<div class="d-section-title" style="margin-top:4px;">🔑 도어락 비밀번호</div>
  <div class="pw-current-box">
    <div class="pw-display-row">
      <div class="pw-display${curPw?'':' empty'}">${curPw?curPw.pw:'비밀번호 없음'}</div>
      <button class="pw-edit-btn" id="pwEditBtn">수정</button>
    </div>
    <div class="pw-edit-row" id="pwEditRow" style="display:none;">
      <input class="pw-input" id="pwInput" placeholder="새 비밀번호 입력" maxlength="20">
      <button class="pw-save-btn" id="pwSaveBtn">저장</button>
    </div>`;
  if(extra.passwords&&extra.passwords.length>1){
    pwHtml+=`<div class="pw-history-title">이전 비밀번호</div>`;
    extra.passwords.slice(1).forEach(p=>{pwHtml+=`<div class="pw-history-item"><span class="pw-history-pw">${p.pw}</span><span class="pw-history-meta">${p.date}</span></div>`;});
  }
  pwHtml+=`</div>`;
  const memos=extra.memos||[];
  let memoHtml=`<div class="d-section-title" style="margin-top:4px;">📝 메모</div>
  <div class="memo-input-row" style="margin-bottom:8px;">
    <textarea class="memo-textarea" id="memoInput" placeholder="이 예약에 대한 메모를 입력하세요..."></textarea>
    <button class="memo-add-btn" id="memoAddBtn">추가</button>
  </div><div id="memoList">`;
  memos.forEach((memo,i)=>{
    memoHtml+=`<div class="memo-item"><div class="memo-item-body"><div class="memo-item-text">${memo.text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div><div class="memo-item-date">${memo.date}</div></div><div style="display:flex;flex-direction:column;gap:4px;"><button class="memo-edit-btn" data-idx="${i}">✎</button><button class="memo-del" data-idx="${i}">✕</button></div></div>`;
  });
  memoHtml+=`</div>`;
  document.getElementById('detailBody').innerHTML=obHtml+bkHtml+blockHtml+splitHtml+pwHtml+memoHtml;
  document.getElementById('detailPanel').classList.add('open');
  // 분할 편집기 렌더
  if(splitEditState) renderSplitEditor();
  // 잠정 승계 분할 / 주의 확인 카드 버튼
  const splitConfirmBtn=document.getElementById('splitConfirmBtn');
  if(splitConfirmBtn&&pendSplit) splitConfirmBtn.onclick=()=>{
    commitSplit(r.name,{...pendSplit.origCin},{...pendSplit.origCout},pendSplit.boundaries.map(b=>({...b})),true);
    showToast('경계를 확정했어요 ✔');
    openDetail(ri,y,m,d);
  };
  const splitExtendBtn=document.getElementById('splitExtendBtn');
  if(splitExtendBtn&&pendSplit) splitExtendBtn.onclick=()=>{
    const edge=pendSplit.autoEdges[0];
    const nb=pendSplit.boundaries.filter(b=>dnum(b)!==dnum(edge)).map(b=>({...b}));
    commitSplit(r.name,{...pendSplit.origCin},{...pendSplit.origCout},nb,true);
    showToast('연장으로 확정했어요 ✔');
    openDetail(ri,y,m,d);
  };
  const attnKeepBtn=document.getElementById('attnKeepBtn');
  if(attnKeepBtn&&attnEntry) attnKeepBtn.onclick=()=>{
    feedAttention=feedAttention.filter(a=>a!==attnEntry);
    saveFeedPrev();
    render();attachCellClicks();
    showToast('확인했어요 ✔');
    openDetail(ri,y,m,d);
  };
  const cellBlockSaveBtn=document.getElementById('cellBlockSaveBtn');
  if(cellBlockSaveBtn){
    cellBlockSaveBtn.onclick=()=>{
      const startStr=document.getElementById('cellBlockStart').value;
      const endStr=document.getElementById('cellBlockEnd').value;
      const reason=document.getElementById('cellBlockReason').value.trim();
      if(!startStr||!endStr){showToast('날짜를 선택해주세요');return;}
      const[sy,sm,sd]=startStr.split('-').map(Number);
      const[ey,em,ed]=endStr.split('-').map(Number);
      if(new Date(sy,sm-1,sd)>new Date(ey,em-1,ed)){showToast('종료일이 시작일보다 앞서요');return;}
      const newBlock={roomName:r.name,startY:sy,startM:sm-1,startD:sd,endY:ey,endM:em-1,endD:ed,reason};
      if(manualBl){
        manualBlocks[manualBlocks.indexOf(manualBl)]=newBlock;
        showToast('블락 수정됐어요 🔒');
      } else {
        manualBlocks.push(newBlock);
        showToast('블락 추가됐어요 🔒');
      }
      saveBlocks();render();attachCellClicks();openDetail(ri,y,m,d);
    };
  }
  const cellBlockDelBtn=document.getElementById('cellBlockDelBtn');
  if(cellBlockDelBtn){
    cellBlockDelBtn.onclick=()=>{
      const bidx=manualBlocks.indexOf(manualBl);
      if(bidx>-1) manualBlocks.splice(bidx,1);
      saveBlocks();render();attachCellClicks();showToast('블락 해제됨');
      document.getElementById('detailPanel').classList.remove('open');
    };
  }
  document.getElementById('pwEditBtn').onclick=()=>{const row=document.getElementById('pwEditRow');row.style.display=row.style.display==='none'?'flex':'none';if(row.style.display==='flex')document.getElementById('pwInput').focus();};
  document.getElementById('pwSaveBtn').onclick=()=>{
    const val=document.getElementById('pwInput').value.trim();if(!val)return;
    const ex=getExtra(pwKey);if(!ex.passwords)ex.passwords=[];
    ex.passwords.unshift({pw:val,date:nowStr()});if(ex.passwords.length>10)ex.passwords=ex.passwords.slice(0,10);
    setExtra(pwKey,ex);showToast('비밀번호 저장됨 🔑');openDetail(ri,y,m,d);
  };
  document.getElementById('pwInput').onkeydown=e=>{if(e.key==='Enter')document.getElementById('pwSaveBtn').click();};
  document.getElementById('memoAddBtn').onclick=()=>{
    const text=document.getElementById('memoInput').value.trim();if(!text)return;
    const ex=getExtra(pwKey);if(!ex.memos)ex.memos=[];
    ex.memos.unshift({text,date:nowStr()});setExtra(pwKey,ex);openDetail(ri,y,m,d);
  };
  document.querySelectorAll('.memo-del').forEach(btn=>{
    btn.onclick=()=>{const idx=+btn.dataset.idx;const ex=getExtra(pwKey);ex.memos.splice(idx,1);setExtra(pwKey,ex);openDetail(ri,y,m,d);};
  });
  document.querySelectorAll('.memo-edit-btn').forEach(btn=>{
    btn.onclick=()=>{
      const idx=+btn.dataset.idx;const ex=getExtra(pwKey);const memo=ex.memos[idx];
      const item=btn.closest('.memo-item');if(item.querySelector('.memo-edit-ta'))return;
      const body=item.querySelector('.memo-item-body');
      body.innerHTML=`<textarea class="memo-edit-ta" style="width:100%;min-height:60px;padding:8px 10px;font-size:13px;background:var(--bg);border:1px solid var(--navy);border-radius:var(--r);color:var(--text);resize:vertical;font-family:'DM Sans',sans-serif;outline:none;">${memo.text}</textarea>
      <div style="display:flex;gap:6px;margin-top:6px;">
        <button style="flex:1;padding:7px;font-size:12px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);cursor:pointer;" id="ms_${idx}">저장</button>
        <button style="padding:7px 12px;font-size:12px;background:none;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);cursor:pointer;" id="mc_${idx}">취소</button>
      </div>`;
      document.getElementById(`ms_${idx}`).onclick=()=>{const newText=body.querySelector('textarea').value.trim();if(!newText)return;const ex=getExtra(pwKey);ex.memos[idx]={text:newText,date:nowStr()+' (수정됨)'};setExtra(pwKey,ex);openDetail(ri,y,m,d);};
      document.getElementById(`mc_${idx}`).onclick=()=>openDetail(ri,y,m,d);
    };
  });
}

// ── SETTINGS ──
function renderRoomList(){
  const list=document.getElementById('roomList');
  document.getElementById('roomCount').textContent=rooms.length;
  if(!rooms.length){list.innerHTML='<div style="font-size:12px;color:var(--text3);padding:8px 0;">아직 등록된 호실이 없어요.</div>';renderExportUrls();return;}
  list.innerHTML=`<div class="reorder-hint">⠿ 드래그로 순서 변경</div>`+rooms.map((r,i)=>`
    <div class="room-item" draggable="true" data-idx="${i}">
      <div class="drag-handle">⠿</div>
      <div class="room-item-dot" style="background:${r.color}"></div>
      <div class="room-item-info" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <div class="room-item-name">${r.name} ${[r.url?'✈':'',r.bkUrl?'🏨':'',r.trUrl?'🌐':'',r.lvUrl?'🏡':''].filter(Boolean).join(' ')}</div>
        <button class="room-edit-btn" data-edit="${i}">✎</button>
        <button class="room-del" data-idx="${i}">✕</button>
      </div>
    </div>`).join('');
  list.querySelectorAll('.room-edit-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=+btn.dataset.edit,r=rooms[idx];
      list.querySelector('.room-edit-form')?.remove();
      const form=document.createElement('div');
      form.className='room-edit-form';
      form.innerHTML=`
        <input class="ical-input" id="en_${idx}" value="${r.name}" placeholder="호실명" maxlength="20">
        <input class="ical-input" id="eu_${idx}" value="${r.url||''}" placeholder="✈ Airbnb iCal URL" autocomplete="off">
        <input class="ical-input" id="eb_${idx}" value="${r.bkUrl||''}" placeholder="🏨 Booking.com iCal URL" autocomplete="off">
        <input class="ical-input" id="et_${idx}" value="${r.trUrl||''}" placeholder="🌐 Trip.com iCal URL" autocomplete="off">
        <input class="ical-input" id="el_${idx}" value="${r.lvUrl||''}" placeholder="🏡 리브애니웨어 iCal URL" autocomplete="off">
        <div class="room-edit-actions">
          <button class="room-edit-save" data-save="${idx}">저장</button>
          <button class="room-edit-cancel">취소</button>
        </div>
        `;
      btn.closest('.room-item').after(form);
      form.querySelector(`#en_${idx}`).focus();
      form.querySelector('.room-edit-cancel').onclick=()=>form.remove();
      form.querySelector('.room-edit-save').onclick=()=>{
        const newName=document.getElementById(`en_${idx}`).value.trim();if(!newName)return;
        rooms[idx].name=newName;rooms[idx].url=document.getElementById(`eu_${idx}`).value.trim();
        rooms[idx].bkUrl=document.getElementById(`eb_${idx}`).value.trim();rooms[idx].trUrl=document.getElementById(`et_${idx}`).value.trim();
        rooms[idx].lvUrl=document.getElementById(`el_${idx}`).value.trim();
        saveRooms();form.remove();renderRoomList();render();showToast('저장됐어요 ✓');
      };
    });
  });
  list.querySelectorAll('.room-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=+e.currentTarget.dataset.idx;
      if(!confirm(rooms[idx].name+' 호실을 삭제할까요?\n삭제하면 복구할 수 없어요.'))return;
      rooms.splice(idx,1);saveRooms();render();renderRoomList();
    });
  });
  const items=list.querySelectorAll('.room-item[draggable]');
  items.forEach(item=>{
    item.addEventListener('dragstart',e=>{dragSrcIdx=+item.dataset.idx;setTimeout(()=>item.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.room-item').forEach(el=>el.classList.remove('drag-over'));});
    item.addEventListener('dragover',e=>{e.preventDefault();list.querySelectorAll('.room-item').forEach(el=>el.classList.remove('drag-over'));item.classList.add('drag-over');});
    item.addEventListener('drop',e=>{e.preventDefault();const ti=+item.dataset.idx;if(dragSrcIdx===null||dragSrcIdx===ti)return;const moved=rooms.splice(dragSrcIdx,1)[0];rooms.splice(ti,0,moved);dragSrcIdx=null;saveRooms();render();renderRoomList();});
  });
  let tsi=null;
  items.forEach(item=>{
    item.addEventListener('touchstart',e=>{tsi=+item.dataset.idx;item.classList.add('dragging');},{passive:true});
    item.addEventListener('touchmove',e=>{e.preventDefault();const touch=e.touches[0];const el=document.elementFromPoint(touch.clientX,touch.clientY);const target=el&&el.closest('.room-item[draggable]');list.querySelectorAll('.room-item').forEach(x=>x.classList.remove('drag-over'));if(target&&target!==item)target.classList.add('drag-over');},{passive:false});
    item.addEventListener('touchend',e=>{item.classList.remove('dragging');const touch=e.changedTouches[0];const el=document.elementFromPoint(touch.clientX,touch.clientY);const target=el&&el.closest('.room-item[draggable]');if(target&&tsi!==null){const ti=+target.dataset.idx;if(tsi!==ti){const moved=rooms.splice(tsi,1)[0];rooms.splice(ti,0,moved);saveRooms();render();renderRoomList();}}tsi=null;list.querySelectorAll('.room-item').forEach(x=>x.classList.remove('drag-over'));});
  });
  renderExportUrls();
}

// ── STATS ──
let archiveData = {};
let statsPlatform = 'all';
let statsView = 'occupancy';
let statsSelMonth = null; // 그래프에서 선택된 달 {y, m} — 패널 열 때 이번 달로 초기화
let cleanFeeShort = parseInt(localStorage.getItem('hana_clean_fee_short') || '25000', 10);
let cleanFeeLong  = parseInt(localStorage.getItem('hana_clean_fee_long')  || '45000', 10);

async function loadArchive() {
  try {
    const resp = await fetch(`${PROXY}/archive`);
    if (!resp.ok) return;
    archiveData = await resp.json();
  } catch(e) {}
}

function mergeArchiveIntoRooms() {
  // 분할 조각 상태에서 재호출될 수 있으므로 원본(raw) 복원 후 병합
  // (복원 없이 병합하면 applySplits가 _raw 백업을 조각 배열로 덮어써 이후 분할 수정이 화면에 반영 안 됨)
  for (const r of rooms) {
    for (const plat of SPLIT_PLATFORMS) {
      const key = SPLIT_KEYMAP[plat];
      if (r['_raw_' + key]) r[key] = r['_raw_' + key];
    }
  }
  const now = new Date(); now.setHours(0,0,0,0);
  const keyMap = { ab: 'bookings', bk: 'bkBookings', tr: 'trBookings', lv: 'lvBookings' };
  for (const room of rooms) {
    const rd = archiveData[room.name];
    if (!rd) continue;
    for (const [src, dest] of Object.entries(keyMap)) {
      const past = (rd[src] || []).filter(b => new Date(b.coutY, b.coutM, b.coutD) < now);
      if (!past.length) continue;
      const existing = new Set((room[dest] || []).map(b => `${b.cinY}_${b.cinM}_${b.cinD}_${b.coutY}_${b.coutM}_${b.coutD}`));
      for (const b of past) {
        const uid = `${b.cinY}_${b.cinM}_${b.cinD}_${b.coutY}_${b.coutM}_${b.coutD}`;
        if (!existing.has(uid)) { room[dest].push(b); existing.add(uid); }
      }
      // 부분 스냅샷 제거: 같은 플랫폼에서 다른 예약 범위 안에 완전히 포함되면 같은 숙박의 옛 버전
      // (Trip.com은 시작일이 매일 당겨진 피드를 보내 아카이브에 여러 장 쌓임 — 워커에도 같은 정리 있음)
      const dnum = b0 => [new Date(b0.cinY,b0.cinM,b0.cinD).getTime(), new Date(b0.coutY,b0.coutM,b0.coutD).getTime()];
      room[dest] = room[dest].filter(b => {
        const [bs, be] = dnum(b);
        return !room[dest].some(o => {
          if (o === b) return false;
          const [os, oe] = dnum(o);
          return os <= bs && oe >= be && (os < bs || oe > be);
        });
      });
    }
  }
  applySplitsAll();
}

function calcOccupancy(roomName, platform, year, month) {
  const total = daysIn(year, month);
  const roomData = archiveData[roomName];
  if (!roomData) return { days: 0, total, noData: true };
  const keys = platform === 'all' ? ['ab','bk','tr','lv'] : [platform];
  const hasAny = keys.some(k => (roomData[k]||[]).length > 0);
  if (!hasAny) return { days: 0, total, noData: true };
  let days = 0;
  for (let d = 1; d <= total; d++) {
    const cur = new Date(year, month, d);
    let occupied = false;
    outer: for (const key of keys) {
      for (const bk of (roomData[key]||[])) {
        const cin = new Date(bk.cinY, bk.cinM, bk.cinD);
        const cout = new Date(bk.coutY, bk.coutM, bk.coutD);
        if (cur >= cin && cur < cout) { occupied = true; break outer; }
      }
    }
    if (occupied) days++;
  }
  return { days, total, noData: false };
}

// calcOccupancy와 동일 기준(cin<=cur<cout)에 요일 분해 추가. 주말 밤 = 금(5)·토(6)
function calcOccupancyDetail(roomName, platform, year, month) {
  const total = daysIn(year, month);
  let wkendTotal = 0;
  for (let d = 1; d <= total; d++) {
    const dow = new Date(year, month, d).getDay();
    if (dow === 5 || dow === 6) wkendTotal++;
  }
  const roomData = archiveData[roomName];
  const keys = platform === 'all' ? ['ab','bk','tr','lv'] : [platform];
  if (!roomData || !keys.some(k => (roomData[k]||[]).length > 0)) {
    return { nights: 0, wkendNights: 0, total, wkendTotal, noData: true };
  }
  let nights = 0, wkendNights = 0;
  for (let d = 1; d <= total; d++) {
    const cur = new Date(year, month, d);
    let occupied = false;
    outer: for (const key of keys) {
      for (const bk of (roomData[key]||[])) {
        const cin = new Date(bk.cinY, bk.cinM, bk.cinD);
        const cout = new Date(bk.coutY, bk.coutM, bk.coutD);
        if (cur >= cin && cur < cout) { occupied = true; break outer; }
      }
    }
    if (occupied) {
      nights++;
      const dow = cur.getDay();
      if (dow === 5 || dow === 6) wkendNights++;
    }
  }
  return { nights, wkendNights, total, wkendTotal, noData: false };
}

function occClass(days, total) {
  if (!total) return 'no-data';
  const pct = days / total;
  if (pct === 0) return 'occ-0';
  if (pct < 0.15) return 'occ-1';
  if (pct < 0.30) return 'occ-2';
  if (pct < 0.45) return 'occ-3';
  if (pct < 0.55) return 'occ-4';
  if (pct < 0.65) return 'occ-5';
  if (pct < 0.75) return 'occ-6';
  if (pct < 0.88) return 'occ-7';
  return 'occ-8';
}

function calcCleanings(roomName, platform, year, month) {
  const roomData = archiveData[roomName];
  if (!roomData) return { short: 0, long: 0, noData: true };
  const keys = platform === 'all' ? ['ab','bk','tr','lv'] : [platform];
  if (!keys.some(k => (roomData[k]||[]).length > 0)) return { short: 0, long: 0, noData: true };
  let shortCnt = 0, longCnt = 0;
  for (const key of keys) {
    for (const bk of (roomData[key]||[])) {
      if (bk.coutY === year && bk.coutM === month) {
        const nights = Math.round(
          (new Date(bk.coutY, bk.coutM, bk.coutD) - new Date(bk.cinY, bk.cinM, bk.cinD))
          / 86400000
        );
        if (nights <= 3) shortCnt++; else longCnt++;
      }
    }
  }
  return { short: shortCnt, long: longCnt, noData: false };
}

function cleanClass(n) {
  if (n === 0) return 'clean-0';
  if (n <= 2)  return 'clean-' + n;
  if (n <= 4)  return 'clean-3';
  if (n <= 6)  return 'clean-' + (n - 1);
  return 'clean-6';
}

function fmtWon(n) {
  return '₩' + n.toLocaleString('ko-KR');
}
function fmtMan(n) {
  const v = n / 10000;
  return (v % 1 === 0 ? v : parseFloat(v.toFixed(1))) + '만';
}

function renderCleaningStats() {
  const grid = document.getElementById('statsGrid');
  document.getElementById('statsChartArea').innerHTML = '';
  const t = today();
  const months = [];
  for (let i = 11; i >= 0; i--) {
    let y = t.y, m = t.m - i;
    while (m < 0) { m += 12; y--; }
    months.push({ y, m });
  }

  const hasData = Object.keys(archiveData).length > 0 &&
    rooms.some(r => {
      const rd = archiveData[r.name];
      return rd && ['ab','bk','tr','lv'].some(k => (rd[k]||[]).length > 0);
    });

  if (!rooms.length || !hasData) {
    grid.innerHTML = `<div class="stats-empty"><strong>🧹</strong>아직 데이터가 없어요.<br>Sync를 실행하면 이번 달부터 쌓이기 시작해요.</div>`;
    return;
  }

  const thead = `<tr>
    <th class="stats-room-th">호실</th>
    ${months.map(({y,m}) => {
      const isCur = y===t.y && m===t.m;
      const label = y!==t.y ? `${String(y).slice(2)}/${m+1}` : `${m+1}월`;
      return `<th class="stats-month-th${isCur?' cur-month':''}">${label}</th>`;
    }).join('')}
  </tr>`;

  const roomRows = rooms.map(r => {
    const cells = months.map(({y,m}) => {
      const {short, long, noData} = calcCleanings(r.name, statsPlatform, y, m);
      if (noData) return `<td class="stats-cell-td"><div class="stats-cell no-data">—</div></td>`;
      const total = short + long;
      const cost  = short * cleanFeeShort + long * cleanFeeLong;
      const cls   = cleanClass(total);
      const tip   = `단기 ${short}회 · 장기 ${long}회 · ${fmtWon(cost)}`;
      return `<td class="stats-cell-td"><div class="stats-cell clean-cell ${cls}" data-tip="${tip}">
        <span class="stats-clean-count">${total}회</span>
        <span class="stats-clean-cost">${total > 0 ? fmtMan(cost) : ''}</span>
      </div></td>`;
    }).join('');
    return `<tr><td class="stats-room-td"><span class="room-dot-s" style="background:${r.color}"></span>${r.name}</td>${cells}</tr>`;
  }).join('');

  const totalCells = months.map(({y,m}) => {
    let sumShort = 0, sumLong = 0, validCount = 0;
    for (const r of rooms) {
      const {short, long, noData} = calcCleanings(r.name, statsPlatform, y, m);
      if (!noData) { sumShort += short; sumLong += long; validCount++; }
    }
    if (!validCount) return `<td class="stats-total-cell-td"><div class="stats-cell no-data">—</div></td>`;
    const total = sumShort + sumLong;
    const cost  = sumShort * cleanFeeShort + sumLong * cleanFeeLong;
    const cls   = cleanClass(Math.min(total, 6));
    return `<td class="stats-total-cell-td"><div class="stats-cell clean-cell ${cls}" data-tip="${total}회 · ${fmtWon(cost)}">
      <span class="stats-clean-count">${total}회</span>
      <span class="stats-clean-cost">${fmtMan(cost)}</span>
    </div></td>`;
  }).join('');

  const totalRow = `<tr><td class="stats-total-td">합계</td>${totalCells}</tr>`;
  grid.innerHTML = `<table class="stats-table"><thead>${thead}</thead><tbody>${roomRows}${totalRow}</tbody></table>`;

  grid.querySelectorAll('.stats-cell[data-tip]').forEach(cell => {
    cell.addEventListener('click', e => {
      const wasActive = cell.classList.contains('tip-active');
      grid.querySelectorAll('.stats-cell.tip-active').forEach(c => {
        c.classList.remove('tip-active');
        c.querySelector('.stats-tooltip')?.remove();
      });
      if (!wasActive) {
        cell.classList.add('tip-active');
        const tip = document.createElement('div');
        tip.className = 'stats-tooltip';
        tip.textContent = cell.dataset.tip;
        cell.appendChild(tip);
      }
      e.stopPropagation();
    });
  });
}

function renderStats() {
  if (statsView === 'cleaning') renderCleaningStats();
  else renderOccupancy();
}

function renderOccupancy() {
  const grid = document.getElementById('statsGrid');
  const chartArea = document.getElementById('statsChartArea');
  const t = today();
  const months = [];
  for (let i = 11; i >= 0; i--) {
    let y = t.y, m = t.m - i;
    while (m < 0) { m += 12; y--; }
    months.push({ y, m });
  }

  const hasData = Object.keys(archiveData).length > 0 &&
    rooms.some(r => {
      const rd = archiveData[r.name];
      return rd && ['ab','bk','tr','lv'].some(k => (rd[k]||[]).length > 0);
    });

  if (!rooms.length || !hasData) {
    chartArea.innerHTML = '';
    grid.innerHTML = `<div class="stats-empty"><strong>📊</strong>아직 데이터가 없어요.<br>Sync를 실행하면 이번 달부터 쌓이기 시작해요.</div>`;
    return;
  }

  // ── 월별 그래프 + 선택 달 상세 ──
  if (!statsSelMonth || !months.some(({y,m}) => y===statsSelMonth.y && m===statsSelMonth.m)) {
    statsSelMonth = { y: t.y, m: t.m };
  }
  const mLabel = (y,m) => y!==t.y ? `${String(y).slice(2)}/${m+1}` : `${m+1}월`;

  const monthStats = months.map(({y,m}) => {
    const total = daysIn(y,m);
    const perRoom = rooms.map(r => ({ room: r, d: calcOccupancyDetail(r.name, statsPlatform, y, m) }));
    let nights=0, wkendNights=0, valid=0;
    for (const {d} of perRoom) if (!d.noData) { nights+=d.nights; wkendNights+=d.wkendNights; valid++; }
    const wkendTotal = perRoom.length ? perRoom[0].d.wkendTotal : 0;
    const pct = valid ? Math.round(nights/(valid*total)*100) : null;
    return { y, m, total, wkendTotal, perRoom, nights, wkendNights, valid, pct };
  });

  const withData = monthStats.filter(s=>s.pct!==null);
  const maxPct = withData.length ? Math.max(...withData.map(s=>s.pct)) : 0;
  const minPct = withData.length ? Math.min(...withData.map(s=>s.pct)) : 0;
  // 동률이 많아도 라벨은 최고·최저 각 1개만 (0%가 여러 달이면 전부에 붙는 것 방지)
  const maxIdx = monthStats.findIndex(s=>s.pct===maxPct);
  const minIdx = monthStats.findIndex(s=>s.pct===minPct);
  const selIdx = monthStats.findIndex(s=>s.y===statsSelMonth.y && s.m===statsSelMonth.m);

  const chartCols = monthStats.map((s,i)=>{
    const selCls = i===selIdx ? ' sel' : '';
    if (s.pct===null) return `<div class="stats-chart-col${selCls}" data-mi="${i}"><div class="stats-chart-nodata">—</div></div>`;
    const showVal = i===selIdx || i===maxIdx || i===minIdx;
    return `<div class="stats-chart-col${selCls}" data-mi="${i}">
      ${showVal ? `<div class="stats-chart-val">${s.pct}%</div>` : ''}
      <div class="stats-chart-bar" style="height:${Math.max(1.5, s.pct*0.82)}%"></div>
    </div>`;
  }).join('');
  const xlabs = monthStats.map((s,i)=>
    `<div class="stats-chart-xlab${i===selIdx?' sel':''}">${mLabel(s.y,s.m)}</div>`
  ).join('');

  const sel = monthStats[selIdx];
  let detailHTML = '';
  if (sel && sel.pct !== null) {
    const wkdayNights   = sel.nights - sel.wkendNights;
    const wkdayTotalAll = sel.valid * (sel.total - sel.wkendTotal);
    const wkendTotalAll = sel.valid * sel.wkendTotal;
    const wkdayPct = wkdayTotalAll ? Math.round(wkdayNights/wkdayTotalAll*100) : 0;
    const wkendPct = wkendTotalAll ? Math.round(sel.wkendNights/wkendTotalAll*100) : 0;
    const avgNights = Math.round(sel.nights/sel.valid*10)/10;
    const lbl = mLabel(sel.y, sel.m);
    detailHTML = `
    <div class="stats-summary">
      <div class="stats-scard">
        <div class="stats-scard-label">${lbl} 평균 점유율</div>
        <div class="stats-scard-big">${sel.pct}%</div>
        <div class="stats-scard-sub">객실 ${sel.valid}개 평균</div>
      </div>
      <div class="stats-scard">
        <div class="stats-scard-label">객실당 평균 숙박</div>
        <div class="stats-scard-big">${avgNights}박</div>
        <div class="stats-scard-sub">${sel.total}일 중</div>
      </div>
      <div class="stats-scard">
        <div class="stats-scard-label">총 숙박</div>
        <div class="stats-scard-big">${sel.nights}박</div>
        <div class="stats-scard-sub">주중 ${wkdayNights}박 · 주말 ${sel.wkendNights}박</div>
      </div>
      <div class="stats-scard">
        <div class="stats-scard-label">주중 / 주말 점유율</div>
        <div class="stats-scard-big">${wkdayPct}% / ${wkendPct}%</div>
        <div class="stats-scard-sub">주말 = 금·토 밤</div>
      </div>
    </div>
    <div class="stats-roombars">
      <div class="stats-roombars-title">${lbl} 호실별 상세</div>
      ${sel.perRoom.map(({room,d})=>{
        const dot = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${room.color};margin-right:4px;vertical-align:1px"></span>`;
        if (d.noData) return `<div class="stats-roombar-row">
          <div class="stats-roombar-name">${dot}${room.name}</div>
          <div class="stats-roombar-track"></div>
          <div class="stats-roombar-val">—</div>
        </div>`;
        const pct = Math.round(d.nights/d.total*100);
        const wkdayW = (d.nights-d.wkendNights)/d.total*100;
        const wkendW = d.wkendNights/d.total*100;
        return `<div class="stats-roombar-row">
          <div class="stats-roombar-name">${dot}${room.name}</div>
          <div class="stats-roombar-track">
            ${wkdayW>0?`<div class="stats-roombar-wkday" style="width:${wkdayW}%"></div>`:''}
            ${wkendW>0?`<div class="stats-roombar-wkend" style="width:${wkendW}%"></div>`:''}
          </div>
          <div class="stats-roombar-val">${d.nights}박 · ${pct}%</div>
        </div>`;
      }).join('')}
      <div class="stats-chart-legend">
        <span><span class="stats-legend-swatch" style="background:#93c5fd"></span>주중 (일~목 밤)</span>
        <span><span class="stats-legend-swatch" style="background:#1e3a8a"></span>주말 (금·토 밤)</span>
      </div>
    </div>`;
  } else {
    detailHTML = `<div class="stats-summary"><div class="stats-scard">
      <div class="stats-scard-label">${mLabel(statsSelMonth.y, statsSelMonth.m)}</div>
      <div class="stats-scard-big">—</div>
      <div class="stats-scard-sub">이 달은 아직 데이터가 없어요</div>
    </div></div>`;
  }

  chartArea.innerHTML = `<div class="stats-chart-wrap">
    <div class="stats-chart">${chartCols}</div>
    <div class="stats-chart-xrow">${xlabs}</div>
  </div>${detailHTML}`;

  chartArea.querySelectorAll('.stats-chart-col').forEach(col=>{
    col.onclick = () => {
      const s = monthStats[+col.dataset.mi];
      statsSelMonth = { y: s.y, m: s.m };
      renderOccupancy();
    };
  });

  const thead = `<tr>
    <th class="stats-room-th">호실</th>
    ${months.map(({y,m}) => {
      const isCur = y===t.y && m===t.m;
      const label = y!==t.y ? `${String(y).slice(2)}/${m+1}` : `${m+1}월`;
      return `<th class="stats-month-th${isCur?' cur-month':''}">${label}</th>`;
    }).join('')}
  </tr>`;

  const roomRows = rooms.map(r => {
    const cells = months.map(({y,m}) => {
      const {days,total,noData} = calcOccupancy(r.name, statsPlatform, y, m);
      if (noData) return `<td class="stats-cell-td"><div class="stats-cell no-data">—</div></td>`;
      const pct = total ? Math.round(days/total*100) : 0;
      const cls = occClass(days, total);
      return `<td class="stats-cell-td"><div class="stats-cell ${cls}" data-tip="${days}박/${total}일 · ${pct}%">${pct}%</div></td>`;
    }).join('');
    return `<tr><td class="stats-room-td"><span class="room-dot-s" style="background:${r.color}"></span>${r.name}</td>${cells}</tr>`;
  }).join('');

  const totalCells = months.map(({y,m}) => {
    const total = daysIn(y,m);
    let sumDays = 0, validCount = 0;
    for (const r of rooms) {
      const {days,noData} = calcOccupancy(r.name, statsPlatform, y, m);
      if (!noData) { sumDays += days; validCount++; }
    }
    if (!validCount) return `<td class="stats-total-cell-td"><div class="stats-cell no-data">—</div></td>`;
    const avgPct = Math.round(sumDays / (validCount * total) * 100);
    const cls = occClass(Math.round(sumDays/validCount), total);
    return `<td class="stats-total-cell-td"><div class="stats-cell ${cls}" data-tip="평균 ${avgPct}%">${avgPct}%</div></td>`;
  }).join('');

  const totalRow = `<tr><td class="stats-total-td">전체 평균</td>${totalCells}</tr>`;

  grid.innerHTML = `<table class="stats-table"><thead>${thead}</thead><tbody>${roomRows}${totalRow}</tbody></table>`;

  grid.querySelectorAll('.stats-cell[data-tip]').forEach(cell => {
    cell.addEventListener('click', e => {
      const wasActive = cell.classList.contains('tip-active');
      grid.querySelectorAll('.stats-cell.tip-active').forEach(c => {
        c.classList.remove('tip-active');
        c.querySelector('.stats-tooltip')?.remove();
      });
      if (!wasActive) {
        cell.classList.add('tip-active');
        const tip = document.createElement('div');
        tip.className = 'stats-tooltip';
        tip.textContent = cell.dataset.tip;
        cell.appendChild(tip);
      }
      e.stopPropagation();
    });
  });
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function registerSW() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.register('./sw.js');
    window._swReg = reg;
    await updateNotifyBtn();
  } catch(e) { console.log('SW 등록 실패', e); }
}

async function getSubscription() {
  if (!window._swReg) return null;
  return await window._swReg.pushManager.getSubscription();
}

async function updateNotifyBtn() {
  const btn = document.getElementById('notifyBtn');
  const toggleBtn = document.getElementById('notifyToggleBtn');
  if (!btn) return;
  const sub = await getSubscription();
  if (sub) {
    btn.style.background = '#1e3a8a';
    btn.style.color = '#fff';
    if (toggleBtn) { toggleBtn.textContent = '🔕 알림 끄기'; toggleBtn.style.color = '#991b1b'; }
  } else {
    btn.style.background = '';
    btn.style.color = '';
    if (toggleBtn) { toggleBtn.textContent = '🔔 알림 켜기'; toggleBtn.style.color = ''; }
  }
}

async function toggleNotify() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    alert('이 브라우저는 푸시 알림을 지원하지 않아요.\niPhone은 Safari로 홈화면에 추가 후 이용하세요.');
    return;
  }
  const reg = window._swReg || await navigator.serviceWorker.register('./sw.js');
  window._swReg = reg;
  const existing = await reg.pushManager.getSubscription();
  if (existing) {
    // 구독 해제
    await existing.unsubscribe();
    await fetch(PROXY + '/push/unsubscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ endpoint: existing.endpoint })
    }).catch(()=>{});
    await updateNotifyBtn();
    alert('알림이 해제되었어요.');
    return;
  }
  // 구독 요청
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') {
    alert('알림 권한이 필요해요. 브라우저 설정에서 허용해 주세요.');
    return;
  }
  try {
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    const subData = sub.toJSON();
    await fetch(PROXY + '/push/subscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(subData)
    });
    await updateNotifyBtn();
    alert('🔔 알림이 설정되었어요!\n새 예약이 생기면 바로 알림을 받을 수 있어요.');
  } catch(e) {
    alert('알림 등록 실패: ' + e.message);
  }
}

async function renderNotifyEvents() {
  const list = document.getElementById('notifyEventList');
  list.innerHTML = '<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px;">불러오는 중...</div>';
  try {
    const res = await fetch(PROXY + '/push/events');
    const events = await res.json();
    if (!events.length) {
      list.innerHTML = '<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px;">알림 내역이 없어요.</div>';
      return;
    }
    list.innerHTML = events.map(e => {
      const dt = new Date(e.ts);
      const timeStr = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
      const isNew = e.type === 'new';
      const isTest = e.type === 'test';
      const isError = e.type === 'error';
      const isRecovered = e.type === 'recovered';
      const icon = isTest ? '🔔' : isNew ? '📅' : isError ? '⚠️' : isRecovered ? '✅' : '❌';
      const color = isTest ? '#6b7280' : isNew ? '#1e3a8a' : isError ? '#92400e' : isRecovered ? '#166534' : '#991b1b';
      const bgColor = e.read ? 'var(--surface2)' : isTest ? '#f9fafb' : isNew ? '#eff6ff' : isError ? '#fffbeb' : isRecovered ? '#f0fdf4' : '#fff1f2';
      const body = isTest
        ? '푸시 알림 테스트'
        : isNew
          ? `${e.platform} ${e.cin}~${e.cout}`
          : isError
            ? `${e.platform} iCal 연결 오류 (15분 이상 실패)`
            : isRecovered
              ? `${e.platform} iCal 연결이 복구됐어요`
              : `${e.platform}${e.cin ? ' ' + e.cin + '~' + e.cout : ''} 취소`;
      return `<div id="ev_${e.id}" style="background:${bgColor};border-radius:12px;padding:12px 14px;border:1px solid var(--border2);opacity:${e.read?'0.6':'1'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div>
            <div style="font-weight:700;font-size:14px;color:${color}">${icon} ${e.room}</div>
            <div style="font-size:13px;color:var(--text2);margin-top:2px">${body}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:4px">${timeStr}</div>
          </div>
          ${e.read ? '<span style="font-size:11px;color:var(--text3)">확인됨</span>' : `<button onclick="markRead('${e.id}')" style="background:${color};color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;white-space:nowrap">확인</button>`}
        </div>
      </div>`;
    }).join('');

    // 미확인 알림 배지 업데이트
    const unread = events.filter(e => !e.read).length;
    updateNotifyBadge(unread);
  } catch(e) {
    list.innerHTML = '<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px;">불러오기 실패</div>';
  }
}

async function markAllRead() {
  try {
    await fetch(PROXY + '/push/events/readall', { method: 'POST' });
    await renderNotifyEvents();
  } catch(e) {}
}

async function markRead(id) {
  await fetch(PROXY + '/push/events/read', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  await renderNotifyEvents();
}

function updateNotifyBadge(count) {
  const btn = document.getElementById('notifyBtn');
  if (!btn) return;
  // 기존 배지 제거
  const old = document.getElementById('notifyBadge');
  if (old) old.remove();
  if (count > 0) {
    const badge = document.createElement('span');
    badge.id = 'notifyBadge';
    badge.textContent = count;
    badge.style.cssText = 'position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;border-radius:999px;font-size:10px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px;';
    btn.style.position = 'relative';
    btn.appendChild(badge);
  }
}

// 앱 시작 시 미확인 알림 배지 표시
async function checkUnreadEvents() {
  try {
    const res = await fetch(PROXY + '/push/events');
    const events = await res.json();
    const unread = events.filter(e => !e.read).length;
    updateNotifyBadge(unread);
  } catch(e) {}
}
